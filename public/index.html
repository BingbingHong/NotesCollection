<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>微信读书笔记</title>
    <style>
      :root {
        --bg: #0b0c10;
        --bg2: #0f1220;
        --panel: rgba(255, 255, 255, 0.06);
        --panel-strong: rgba(255, 255, 255, 0.09);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.64);
        --accent: #8b5cf6;
        --accent-2: #22c55e;
        --border: rgba(255, 255, 255, 0.12);
        --border-2: rgba(255, 255, 255, 0.18);
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.55);
        --shadow-2: 0 6px 20px rgba(0, 0, 0, 0.4);
        --ring: 0 0 0 4px rgba(139, 92, 246, 0.25);
        --radius: 16px;
        --radius-sm: 12px;
      }

      body {
        margin: 0;
        font-family: "PingFang SC", "Noto Sans SC", "Helvetica Neue", Arial, sans-serif;
        background: radial-gradient(1200px 600px at 20% -10%, rgba(139, 92, 246, 0.18), transparent 55%),
          radial-gradient(900px 500px at 95% 0%, rgba(34, 197, 94, 0.12), transparent 50%),
          linear-gradient(180deg, var(--bg2), var(--bg));
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      header {
        padding: 32px 24px 16px;
        max-width: 1100px;
        margin: 0 auto;
      }

      .header-bar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
      }

      .icon-button {
        display: inline-flex;
        width: 44px;
        height: 44px;
        border-radius: 14px;
        border: none;
        background: #ffffff;
        color: #000000;
        text-decoration: none;
        align-items: center;
        justify-content: center;
        user-select: none;
        box-shadow: 0px 10px 15px -3px #0000001a, 0px 4px 6px -4px #0000001a;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }

      .icon-button svg {
        width: 20px;
        height: 20px;
        flex: 0 0 auto;
      }

      .icon-button:hover {
        transform: translateY(-1px);
        box-shadow: 0px 12px 18px -3px #0000002a, 0px 6px 8px -4px #0000002a;
      }

      .icon-button:focus-visible {
        outline: none;
        box-shadow: var(--shadow), var(--ring);
      }

      header h1 {
        margin: 0 0 8px;
        font-size: 28px;
        letter-spacing: -0.02em;
      }

      header p {
        margin: 0;
        color: var(--muted);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 0 24px 40px;
      }

      .import-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        background: var(--panel);
        margin-top: 16px;
        box-shadow: var(--shadow-2);
        backdrop-filter: blur(10px);
      }

      .import-panel h2 {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .import-panel p {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .import-panel textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px 14px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        background: rgba(0, 0, 0, 0.18);
        color: var(--text);
        font-size: 14px;
        resize: vertical;
      }

      .import-panel textarea:focus-visible {
        outline: none;
        border-color: rgba(139, 92, 246, 0.55);
        box-shadow: var(--ring);
      }

      .import-actions {
        display: flex;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .import-actions button,
      .import-actions a {
        padding: 10px 16px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--accent);
        color: white;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 150ms ease, filter 150ms ease, background 150ms ease, border-color 150ms ease;
      }

      .import-actions button.secondary,
      .import-actions a.secondary {
        background: transparent;
        color: var(--text);
      }

      .import-actions button:hover,
      .import-actions a:hover {
        transform: translateY(-1px);
        filter: brightness(1.05);
      }

      .import-actions button:focus-visible,
      .import-actions a:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }

      .import-status {
        margin-top: 10px;
        color: var(--muted);
        font-size: 13px;
      }

      .page {
        display: none;
      }

      .page.active {
        display: block;
      }

      .controls {
        display: grid;
        grid-template-columns: minmax(200px, 1.6fr) minmax(160px, 1fr) minmax(160px, 1fr) minmax(140px, 1fr);
        gap: 12px;
        margin: 20px 0;
      }

      .search-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }

      .search-wrapper svg {
        position: absolute;
        left: 12px;
        width: 18px;
        height: 18px;
        color: var(--muted);
        pointer-events: none;
      }

      .search-wrapper input {
        width: 100%;
        padding-left: 38px !important;
      }

      .review-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        background: var(--panel);
        margin-bottom: 18px;
        box-shadow: var(--shadow-2);
        backdrop-filter: blur(10px);
      }

      .review-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .review-header h2 {
        margin: 0;
        font-size: 18px;
      }

      .review-card {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px 16px;
        background: var(--bg);
        white-space: pre-line;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
        gap: 12px;
        height: 160px; /* 固定高度 */
      }

      #reviewContent {
        flex: 1;
        overflow-y: auto; /* 内容超出时支持滚动 */
        padding-right: 8px; /* 给滚动条留点空间 */
      }

      #reviewContent::-webkit-scrollbar {
        width: 6px;
      }
      
      #reviewContent::-webkit-scrollbar-thumb {
        background-color: var(--border);
        border-radius: 4px;
      }

      .review-footer {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
      }

      .review-progress {
        color: var(--muted);
        font-size: 12px;
      }

      .review-actions {
        display: flex;
        gap: 8px;
      }

      .review-actions button {
        padding: 6px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
      }

      .review-actions button:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
      }

      .review-actions button:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }

      .review-meta {
        margin-bottom: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .selection-bar {
        display: none;
        flex-wrap: wrap;
        align-items: center;
        gap: 12px;
        margin: 12px 0 18px;
      }

      .selection-bar.active {
        display: flex;
      }

      .selection-bar span {
        color: var(--muted);
        font-size: 14px;
      }

      .selection-bar button {
        padding: 8px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
      }

      .selection-bar button.primary {
        background: var(--accent);
        color: white;
      }

      .selection-bar button:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
      }

      .selection-bar button.primary:hover {
        background: var(--accent);
      }

      .selection-bar button:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }

      .selection-bar button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .controls input,
      .controls select {
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 14px;
      }

      .controls select {
        padding-right: 32px;
      }

      .controls input::placeholder {
        color: rgba(255, 255, 255, 0.42);
      }

      .controls input:focus-visible,
      .controls select:focus-visible {
        outline: none;
        border-color: rgba(139, 92, 246, 0.55);
        box-shadow: var(--ring);
      }

      .stats {
        color: var(--muted);
        font-size: 14px;
        margin-bottom: 16px;
      }

      .stats-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .manage-button {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #ffffff1a;
        border-radius: 14px;
        background: #ffffff0d;
        width: 50px;
        height: 34px;
        color: var(--text);
        cursor: pointer;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      .manage-button svg {
        width: 16px;
        height: 16px;
        flex-grow: 1;
      }

      .manage-button:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
        box-shadow: var(--shadow-2);
      }

      .manage-button:focus-visible {
        outline: none;
        box-shadow: var(--shadow-2), var(--ring);
      }

      .notes {
        display: grid;
        gap: 16px;
      }

      .note {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px 20px;
        background: var(--panel);
        box-shadow: var(--shadow-2);
        backdrop-filter: blur(10px);
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease, box-shadow 150ms ease;
      }

      .note:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
        box-shadow: var(--shadow);
      }

      .note h3 {
        margin: 0 0 8px;
        font-size: 16px;
      }

      .note-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .note-actions {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .note-actions button {
        padding: 6px 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
      }

      .note-actions button:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
      }

      .note-actions button:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }

      .note-actions input {
        width: 16px;
        height: 16px;
      }

      .meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 10px;
      }

      .tag {
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
      }

      .note p {
        margin: 0;
        white-space: pre-line;
        line-height: 1.6;
      }

      .empty {
        padding: 40px 0;
        color: var(--muted);
      }

      .pagination {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 12px;
        margin-top: 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .pagination button {
        padding: 8px 14px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        cursor: pointer;
        transition: transform 150ms ease, border-color 150ms ease, background 150ms ease;
      }

      .pagination button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .pagination button:hover {
        transform: translateY(-1px);
        border-color: var(--border-2);
        background: rgba(255, 255, 255, 0.09);
      }

      .pagination button:focus-visible {
        outline: none;
        box-shadow: var(--ring);
      }

      @media (max-width: 900px) {
        .controls {
          grid-template-columns: 1fr 1fr;
        }
      }

      @media (max-width: 560px) {
        header {
          padding: 22px 16px 10px;
        }
        main {
          padding: 0 16px 32px;
        }
        .controls {
          grid-template-columns: 1fr;
        }
        .icon-button {
          height: 38px;
          padding: 0 10px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-bar">
        <div>
          <h1>微信读书笔记</h1>
          <p>按书名、章节或关键词快速定位你的阅读想法</p>
        </div>
        <div class="header-actions">
          <a id="importLink" class="icon-button" href="#import" title="新增笔记" aria-label="新增笔记">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.16663 10H15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 4.16666V15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      </div>
    </header>
    <main>
      <section class="import-panel page" id="importPage">
        <h2>新增笔记</h2>
        <p>支持微信读书粘贴格式，也支持字段格式导入</p>
        <textarea
          id="importInput"
          placeholder="《梁永安：阅读、游历和爱情》

梁永安
4个笔记

谈自我

◆ 年轻人拥有未来。
如何衡量自我价值？其实很简单：每天都反思一下自己……

或者使用字段格式：

书名：她们何以不同：52个生活之问
作者：梁永安
章节：女性的自我建设
类型：想法
内容：这段让我意识到专业能力的重要性

书名：始于极限：女性主义往复书简
类型：摘录
内容：恋爱会帮助我们了解自己的欲望、嫉妒、控制欲"
        ></textarea>
        <div class="import-actions">
          <button id="importButton">导入到本地</button>
          <button id="clearInputButton" class="secondary">清空输入</button>
          <a id="backToList" href="#" class="secondary">返回浏览</a>
        </div>
        <div class="import-status" id="importStatus"></div>
      </section>
      <section class="page" id="listPage">
        <section class="review-panel" id="reviewPanel">
          <div class="review-header">
            <h2>今日复习</h2>
          </div>
          <div class="review-meta" id="reviewMeta"></div>
          <div class="review-card">
            <div id="reviewContent"></div>
            <div class="review-footer">
              <span class="review-progress" id="reviewProgress"></span>
              <div class="review-actions">
                <button id="reviewPrev">上一条</button>
                <button id="reviewNext">下一条</button>
              </div>
            </div>
          </div>
        </section>
        <div class="controls">
          <div class="search-wrapper">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M9.16667 15.8333C12.8486 15.8333 15.8333 12.8486 15.8333 9.16667C15.8333 5.48477 12.8486 2.5 9.16667 2.5C5.48477 2.5 2.5 5.48477 2.5 9.16667C2.5 12.8486 5.48477 15.8333 9.16667 15.8333Z" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M17.5 17.5L13.9166 13.9167" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <input id="searchInput" type="search" placeholder="搜索关键词" />
          </div>
          <select id="bookSelect"></select>
          <select id="sectionSelect"></select>
          <select id="typeSelect"></select>
        </div>
        <div class="selection-bar" id="selectionBar">
          <span id="selectionCount">已选择 0 条</span>
          <button id="deleteSelected" class="primary" disabled>删除所选</button>
          <button id="clearSelected">清空选择</button>
        </div>
        <div class="stats stats-row">
          <div id="stats"></div>
          <button id="manageToggle" class="manage-button" title="管理笔记">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8.14667 1.33334H7.85333C7.49971 1.33334 7.16057 1.47382 6.91053 1.72387C6.66048 1.97392 6.52 2.31305 6.52 2.66668V2.78668C6.51976 3.02049 6.45804 3.25014 6.34103 3.45257C6.22401 3.655 6.05583 3.8231 5.85333 3.94001L5.56667 4.10668C5.36398 4.2237 5.13405 4.28531 4.9 4.28531C4.66595 4.28531 4.43603 4.2237 4.23333 4.10668L4.13333 4.05334C3.82738 3.87685 3.46389 3.82897 3.12267 3.92022C2.78145 4.01146 2.49037 4.23437 2.31333 4.54001L2.16667 4.79334C1.99018 5.0993 1.9423 5.46279 2.03354 5.80401C2.12478 6.14523 2.34769 6.43631 2.65333 6.61334L2.75333 6.68001C2.95485 6.79635 3.12241 6.9634 3.23937 7.16456C3.35632 7.36573 3.4186 7.59399 3.42 7.82668V8.16668C3.42093 8.40162 3.35977 8.63265 3.2427 8.83635C3.12563 9.04005 2.95681 9.2092 2.75333 9.32668L2.65333 9.38668C2.34769 9.56371 2.12478 9.85479 2.03354 10.196C1.9423 10.5372 1.99018 10.9007 2.16667 11.2067L2.31333 11.46C2.49037 11.7657 2.78145 11.9886 3.12267 12.0798C3.46389 12.171 3.82738 12.1232 4.13333 11.9467L4.23333 11.8933C4.43603 11.7763 4.66595 11.7147 4.9 11.7147C5.13405 11.7147 5.36398 11.7763 5.56667 11.8933L5.85333 12.06C6.05583 12.1769 6.22401 12.345 6.34103 12.5475C6.45804 12.7499 6.51976 12.9795 6.52 13.2133V13.3333C6.52 13.687 6.66048 14.0261 6.91053 14.2762C7.16057 14.5262 7.49971 14.6667 7.85333 14.6667H8.14667C8.50029 14.6667 8.83943 14.5262 9.08948 14.2762C9.33953 14.0261 9.48 13.687 9.48 13.3333V13.2133C9.48024 12.9795 9.54196 12.7499 9.65898 12.5475C9.77599 12.345 9.94418 12.1769 10.1467 12.06L10.4333 11.8933C10.636 11.7763 10.866 11.7147 11.1 11.7147C11.3341 11.7147 11.564 11.7763 11.7667 11.8933L11.8667 11.9467C12.1726 12.1232 12.5361 12.171 12.8773 12.0798C13.2186 11.9886 13.5096 11.7657 13.6867 11.46L13.8333 11.2C14.0098 10.8941 14.0577 10.5306 13.9665 10.1893C13.8752 9.84812 13.6523 9.55704 13.3467 9.38001L13.2467 9.32668C13.0432 9.2092 12.8744 9.04005 12.7573 8.83635C12.6402 8.63265 12.5791 8.40162 12.58 8.16668V7.83334C12.5791 7.5984 12.6402 7.36738 12.7573 7.16367C12.8744 6.95997 13.0432 6.79082 13.2467 6.67334L13.3467 6.61334C13.6523 6.43631 13.8752 6.14523 13.9665 5.80401C14.0577 5.46279 14.0098 5.0993 13.8333 4.79334L13.6867 4.54001C13.5096 4.23437 13.2186 4.01146 12.8773 3.92022C12.5361 3.82897 12.1726 3.87685 11.8667 4.05334L11.7667 4.10668C11.564 4.2237 11.3341 4.28531 11.1 4.28531C10.866 4.28531 10.636 4.2237 10.4333 4.10668L10.1467 3.94001C9.94418 3.8231 9.77599 3.655 9.65898 3.45257C9.54196 3.25014 9.48024 3.02049 9.48 2.78668V2.66668C9.48 2.31305 9.33953 1.97392 9.08948 1.72387C8.83943 1.47382 8.50029 1.33334 8.14667 1.33334Z" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10Z" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="notes" id="notes"></div>
        <div class="pagination" id="pagination">
          <button id="prevPage">上一页</button>
          <span id="pageInfo"></span>
          <button id="nextPage">下一页</button>
        </div>
      </section>
    </main>
    <script>
      const state = {
        notes: [],
        filtered: [],
        books: [],
        baseNotes: [],
        extraNotes: [],
        page: 1,
        pageSize: 20,
        selectedIds: new Set(),
        deletedIds: new Set(),
        reviewIds: [],
        reviewIndex: 0,
        manageMode: false,
      }

      const searchInput = document.getElementById("searchInput")
      const bookSelect = document.getElementById("bookSelect")
      const sectionSelect = document.getElementById("sectionSelect")
      const typeSelect = document.getElementById("typeSelect")
      const notesContainer = document.getElementById("notes")
      const stats = document.getElementById("stats")
      const pagination = document.getElementById("pagination")
      const prevPageButton = document.getElementById("prevPage")
      const nextPageButton = document.getElementById("nextPage")
      const pageInfo = document.getElementById("pageInfo")
      const importInput = document.getElementById("importInput")
      const importButton = document.getElementById("importButton")
      const clearInputButton = document.getElementById("clearInputButton")
      const importStatus = document.getElementById("importStatus")
      const importPage = document.getElementById("importPage")
      const listPage = document.getElementById("listPage")
      const importLink = document.getElementById("importLink")
      const backToList = document.getElementById("backToList")
      const selectionBar = document.getElementById("selectionBar")
      const selectionCount = document.getElementById("selectionCount")
      const deleteSelected = document.getElementById("deleteSelected")
      const clearSelected = document.getElementById("clearSelected")
      const reviewPanel = document.getElementById("reviewPanel")
      const reviewMeta = document.getElementById("reviewMeta")
      const reviewContent = document.getElementById("reviewContent")
      const reviewPrev = document.getElementById("reviewPrev")
      const reviewNext = document.getElementById("reviewNext")
      const reviewProgress = document.getElementById("reviewProgress")
      const manageToggle = document.getElementById("manageToggle")

      const unique = (items) => Array.from(new Set(items)).filter(Boolean)
      const storageKey = "extraNotes"
      const deletedKey = "deletedNotes"
      const reviewKey = "dailyReview"

      const renderOptions = (select, options, placeholder) => {
        select.innerHTML = ""
        const emptyOption = document.createElement("option")
        emptyOption.value = ""
        emptyOption.textContent = placeholder
        select.appendChild(emptyOption)
        options.forEach((option) => {
          const el = document.createElement("option")
          el.value = option
          el.textContent = option
          select.appendChild(el)
        })
      }

      const renderTypeOptions = () => {
        typeSelect.innerHTML = ""
        const emptyOption = document.createElement("option")
        emptyOption.value = ""
        emptyOption.textContent = "全部类型"
        typeSelect.appendChild(emptyOption)
        const quoteOption = document.createElement("option")
        quoteOption.value = "quote"
        quoteOption.textContent = "摘录"
        typeSelect.appendChild(quoteOption)
        const thoughtOption = document.createElement("option")
        thoughtOption.value = "thought"
        thoughtOption.textContent = "想法"
        typeSelect.appendChild(thoughtOption)
      }

      const applyFilters = () => {
        const keyword = searchInput.value.trim()
        const book = bookSelect.value
        const section = sectionSelect.value
        const kind = typeSelect.value

        let filtered = state.notes
        if (book) {
          filtered = filtered.filter((note) => note.bookTitle === book)
        }
        if (section) {
          filtered = filtered.filter((note) => note.section === section)
        }
        if (kind) {
          filtered = filtered.filter((note) => note.kind === kind)
        }
        if (keyword) {
          filtered = filtered.filter((note) => note.text.includes(keyword))
        }

        state.filtered = filtered
        state.page = 1
        cleanupSelection()
        renderNotes()
      }

      const renderNotes = () => {
        notesContainer.innerHTML = ""
        const total = state.filtered.length
        const totalPages = Math.max(1, Math.ceil(total / state.pageSize))
        if (state.page > totalPages) {
          state.page = totalPages
        }
        const startIndex = (state.page - 1) * state.pageSize
        const endIndex = Math.min(startIndex + state.pageSize, total)
        const pageNotes = state.filtered.slice(startIndex, endIndex)
        stats.textContent = total === 0 ? "共 0 条笔记" : `共 ${total} 条笔记，当前 ${startIndex + 1}-${endIndex}`
        if (total === 0) {
          const empty = document.createElement("div")
          empty.className = "empty"
          empty.textContent = "没有匹配的笔记"
          notesContainer.appendChild(empty)
          pagination.style.display = "none"
          updateSelectionBar()
          return
        }

        pagination.style.display = "flex"
        pageInfo.textContent = `${state.page} / ${totalPages}`
        prevPageButton.disabled = state.page <= 1
        nextPageButton.disabled = state.page >= totalPages

        pageNotes.forEach((note) => {
          const card = document.createElement("div")
          card.className = "note"

          const header = document.createElement("div")
          header.className = "note-header"

          const title = document.createElement("h3")
          title.textContent = note.bookTitle

          header.appendChild(title)
          if (state.manageMode) {
            const actions = document.createElement("div")
            actions.className = "note-actions"
            const checkbox = document.createElement("input")
            checkbox.type = "checkbox"
            checkbox.checked = state.selectedIds.has(note.id)
            checkbox.addEventListener("change", () => {
              if (checkbox.checked) {
                state.selectedIds.add(note.id)
              } else {
                state.selectedIds.delete(note.id)
              }
              updateSelectionBar()
            })
            const deleteButton = document.createElement("button")
            deleteButton.textContent = "🗑️"
            deleteButton.addEventListener("click", () => {
              removeNotes([note.id])
            })
            actions.appendChild(checkbox)
            actions.appendChild(deleteButton)
            header.appendChild(actions)
          }

          const meta = document.createElement("div")
          meta.className = "meta"
          const author = document.createElement("span")
          author.className = "tag"
          author.textContent = note.author || "作者未知"
          const section = document.createElement("span")
          section.className = "tag"
          section.textContent = note.section || "未分章"
          const kind = document.createElement("span")
          kind.className = "tag"
          kind.textContent = note.kind === "thought" ? "想法" : "摘录"
          meta.appendChild(author)
          meta.appendChild(section)
          meta.appendChild(kind)

          const text = document.createElement("p")
          text.textContent = note.text

          card.appendChild(header)
          card.appendChild(meta)
          card.appendChild(text)
          notesContainer.appendChild(card)
        })
        updateSelectionBar()
      }

      const updateSections = () => {
        const book = bookSelect.value
        const notes = book
          ? state.notes.filter((note) => note.bookTitle === book)
          : state.notes
        const sections = unique(notes.map((note) => note.section))
        renderOptions(sectionSelect, sections, "所有章节")
      }

      const updateBooks = () => {
        const selected = bookSelect.value
        const bookTitles = unique(state.notes.map((note) => note.bookTitle))
        renderOptions(bookSelect, bookTitles, "全部书籍")
        if (bookTitles.includes(selected)) {
          bookSelect.value = selected
        }
      }

      const hashString = (value) => {
        let hash = 0
        for (let i = 0; i < value.length; i += 1) {
          hash = (hash << 5) - hash + value.charCodeAt(i)
          hash |= 0
        }
        return Math.abs(hash).toString(36)
      }

      const buildNoteId = (note) => {
        const content = [
          note.bookTitle,
          note.author,
          note.section,
          note.kind,
          note.text,
        ].join("||")
        return hashString(content)
      }

      const normalizeNote = (note) => {
        const base = {
          bookTitle: note.bookTitle || "未命名书籍",
          author: note.author || "",
          section: note.section || "",
          text: note.text || "",
          kind: note.kind || "quote",
          source: note.source || "base",
        }
        return {
          ...base,
          id: note.id || buildNoteId(base),
        }
      }

      const normalizeType = (value) => {
        const text = value.trim()
        const thoughtKeys = ["想法", "心得", "感想", "评论", "笔记", "读后感", "备注"]
        const quoteKeys = ["摘录", "原文", "引用", "划线"]
        if (thoughtKeys.some((key) => text.includes(key))) {
          return "thought"
        }
        if (quoteKeys.some((key) => text.includes(key))) {
          return "quote"
        }
        return ""
      }

      const extractThoughtText = (text) => {
        const prefixes = ["我的想法", "想法", "心得", "感想", "评论", "笔记", "读后感", "备注"]
        const match = text.match(new RegExp(`^(?:${prefixes.join("|")})[:：]?\\s*(.*)$`))
        if (!match) {
          return { isThought: false, text }
        }
        return { isThought: true, text: match[1].trim() }
      }

      const isWeReadHeading = (text, prevBlank, nextBlank) => {
        if (!text) {
          return false
        }
        if (text.length > 30) {
          return false
        }
        if (text.startsWith("◆")) {
          return false
        }
        if (text.endsWith("个笔记")) {
          return false
        }
        if (text.includes("微信读书")) {
          return false
        }
        if (text.match(/^《.+》$/)) {
          return false
        }
        if (!(prevBlank || nextBlank)) {
          return false
        }
        return true
      }

      const parseWeReadText = (raw) => {
        const lines = raw
          .split(/\r?\n/)
          .map((line) => line.trim())
        const notes = []
        let currentBook = ""
        let currentAuthor = ""
        let currentSection = ""
        let expectAuthor = false
        let lastNote = null

        lines.forEach((line, index) => {
          const prevBlank = index > 0 && !lines[index - 1]
          const nextBlank = index + 1 < lines.length && !lines[index + 1]
          if (!line) {
            return
          }
          if (line.includes("微信读书")) {
            return
          }
          const titleMatch = line.match(/^《(.+)》$/)
          if (titleMatch) {
            currentBook = titleMatch[1].trim()
            currentAuthor = ""
            currentSection = ""
            expectAuthor = true
            lastNote = null
            return
          }
          if (expectAuthor) {
            if (!line.endsWith("个笔记")) {
              currentAuthor = line
            }
            expectAuthor = false
            return
          }
          if (line.endsWith("个笔记")) {
            return
          }
          if (!currentBook) {
            return
          }
          if (line.startsWith("◆")) {
            const content = line.replace(/^◆\s*/, "")
            const thoughtResult = extractThoughtText(content)
            const note = normalizeNote({
              bookTitle: currentBook,
              author: currentAuthor,
              section: currentSection,
              text: thoughtResult.text,
              kind: thoughtResult.isThought ? "thought" : "quote",
            })
            notes.push(note)
            lastNote = note
            return
          }
          if (isWeReadHeading(line, prevBlank, nextBlank)) {
            currentSection = line
            lastNote = null
            return
          }
          if (lastNote && !prevBlank && !isWeReadHeading(line, prevBlank, nextBlank)) {
            lastNote.text = `${lastNote.text}\n${line}`
            return
          }
          const thoughtResult = extractThoughtText(line)
          const note = normalizeNote({
            bookTitle: currentBook,
            author: currentAuthor,
            section: currentSection,
            text: thoughtResult.text,
            kind: thoughtResult.isThought ? "thought" : "quote",
            source: "extra",
          })
          notes.push(note)
          lastNote = note
        })

        return notes.filter((note) => note.text)
      }

      const loadExtraNotes = () => {
        try {
          const raw = localStorage.getItem(storageKey)
          if (!raw) {
            return []
          }
          const parsed = JSON.parse(raw)
          if (!Array.isArray(parsed)) {
            return []
          }
          return parsed.map((note) => normalizeNote({ ...note, source: "extra" })).filter((note) => note.text)
        } catch {
          return []
        }
      }

      const saveExtraNotes = (notes) => {
        localStorage.setItem(storageKey, JSON.stringify(notes))
      }

      const loadDeletedIds = () => {
        try {
          const raw = localStorage.getItem(deletedKey)
          if (!raw) {
            return new Set()
          }
          const parsed = JSON.parse(raw)
          if (!Array.isArray(parsed)) {
            return new Set()
          }
          return new Set(parsed)
        } catch {
          return new Set()
        }
      }

      const saveDeletedIds = () => {
        localStorage.setItem(deletedKey, JSON.stringify(Array.from(state.deletedIds)))
      }

      const cleanupSelection = () => {
        const allowed = new Set(state.filtered.map((note) => note.id))
        state.selectedIds.forEach((id) => {
          if (!allowed.has(id)) {
            state.selectedIds.delete(id)
          }
        })
        updateSelectionBar()
      }

      const updateSelectionBar = () => {
        selectionCount.textContent = `已选择 ${state.selectedIds.size} 条`
        if (state.manageMode) {
          selectionBar.classList.add("active")
        } else {
          selectionBar.classList.remove("active")
        }
        deleteSelected.disabled = state.selectedIds.size === 0 || !state.manageMode
      }

      const removeNotes = (ids) => {
        if (ids.length === 0) {
          return
        }
        const idSet = new Set(ids)
        state.deletedIds = new Set([...state.deletedIds, ...ids])
        state.extraNotes = state.extraNotes.filter((note) => !idSet.has(note.id))
        saveExtraNotes(state.extraNotes)
        saveDeletedIds()
        rebuildNotes()
        updateBooks()
        updateSections()
        applyFilters()
        refreshReview()
      }

      const rebuildNotes = () => {
        const allNotes = [...state.baseNotes, ...state.extraNotes]
        state.notes = allNotes.filter((note) => !state.deletedIds.has(note.id))
        state.filtered = state.notes
      }

      const getTodayKey = () => {
        const now = new Date()
        const year = now.getFullYear()
        const month = String(now.getMonth() + 1).padStart(2, "0")
        const day = String(now.getDate()).padStart(2, "0")
        return `${year}-${month}-${day}`
      }

      const shuffle = (items) => {
        const array = [...items]
        for (let i = array.length - 1; i > 0; i -= 1) {
          const j = Math.floor(Math.random() * (i + 1))
          ;[array[i], array[j]] = [array[j], array[i]]
        }
        return array
      }

      const loadDailyReview = () => {
        try {
          const raw = localStorage.getItem(reviewKey)
          if (!raw) {
            return null
          }
          return JSON.parse(raw)
        } catch {
          return null
        }
      }

      const saveDailyReview = (payload) => {
        localStorage.setItem(reviewKey, JSON.stringify(payload))
      }

      const buildDailyReview = () => {
        const today = getTodayKey()
        const stored = loadDailyReview()
        const validIds = state.notes.map((note) => note.id)
        if (stored && stored.date === today) {
          const filtered = stored.ids.filter((id) => validIds.includes(id))
          if (filtered.length > 0) {
            state.reviewIds = filtered.slice(0, 10)
            return
          }
        }
        const selected = shuffle(validIds).slice(0, 10)
        state.reviewIds = selected
        saveDailyReview({ date: today, ids: selected })
      }

      const renderReview = () => {
        if (state.reviewIds.length === 0) {
          reviewPanel.style.display = "none"
          return
        }
        reviewPanel.style.display = "block"
        if (state.reviewIndex >= state.reviewIds.length) {
          state.reviewIndex = 0
        }
        const id = state.reviewIds[state.reviewIndex]
        const note = state.notes.find((item) => item.id === id)
        if (!note) {
          return
        }
        reviewMeta.textContent = `${note.bookTitle} · ${note.section || "未分章"} · ${note.kind === "thought" ? "想法" : "摘录"}`
        reviewContent.textContent = note.text
        reviewProgress.textContent = `${state.reviewIndex + 1}/${state.reviewIds.length}`
        reviewPrev.disabled = state.reviewIds.length <= 1
        reviewNext.disabled = state.reviewIds.length <= 1
      }

      const refreshReview = () => {
        buildDailyReview()
        renderReview()
      }
      const parseImportText = (raw) => {
        const weReadLike = /《[^》]+》/.test(raw) || /微信读书/.test(raw)
        if (weReadLike) {
          const parsed = parseWeReadText(raw)
          if (parsed.length > 0) {
            return parsed
          }
        }
        const blocks = raw
          .split(/\n\s*\n/)
          .map((block) => block.trim())
          .filter(Boolean)

        const results = []

        blocks.forEach((block) => {
          const lines = block
            .split(/\n/)
            .map((line) => line.trim())
            .filter(Boolean)

          const note = {
            bookTitle: "",
            author: "",
            section: "",
            kind: "thought",
            text: "",
          }

          const contentLines = []

          lines.forEach((line) => {
            const match = line.match(/^([^:：]+)[:：]\s*(.*)$/)
            if (match) {
              const key = match[1].trim()
              const value = match[2].trim()
              if (["书名", "书籍"].includes(key)) {
                note.bookTitle = value
                return
              }
              if (["作者"].includes(key)) {
                note.author = value
                return
              }
              if (["章节", "小节", "位置"].includes(key)) {
                note.section = value
                return
              }
              if (["类型", "分类"].includes(key)) {
                const normalized = normalizeType(value)
                if (normalized) {
                  note.kind = normalized
                }
                return
              }
              if (["想法", "心得", "感想", "评论", "笔记", "读后感", "备注"].includes(key)) {
                note.kind = "thought"
                if (value) {
                  contentLines.push(value)
                }
                return
              }
              if (["摘录", "原文", "引用", "划线"].includes(key)) {
                note.kind = "quote"
                if (value) {
                  contentLines.push(value)
                }
                return
              }
              if (["内容", "正文"].includes(key)) {
                if (value) {
                  contentLines.push(value)
                }
                return
              }
            }
            contentLines.push(line)
          })

          note.text = contentLines.join("\n").trim()
          results.push(normalizeNote({ ...note, source: "extra" }))
        })

        return results.filter((note) => note.text)
      }

      const updateRoute = () => {
        const isImport = window.location.hash === "#import"
        if (isImport) {
          importPage.classList.add("active")
          listPage.classList.remove("active")
          importLink.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.16663 10H15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 4.16666V15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`
          importLink.setAttribute("href", "#")
          importLink.setAttribute("title", "返回浏览")
          return
        }
        importPage.classList.remove("active")
        listPage.classList.add("active")
        importLink.innerHTML = `
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4.16663 10H15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M10 4.16666V15.8333" stroke="currentColor" stroke-width="1.66667" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>`
        importLink.setAttribute("href", "#import")
        importLink.setAttribute("title", "新增笔记")
      }

      const attachEvents = () => {
        searchInput.addEventListener("input", applyFilters)
        bookSelect.addEventListener("change", () => {
          updateSections()
          applyFilters()
        })
        sectionSelect.addEventListener("change", applyFilters)
        typeSelect.addEventListener("change", applyFilters)
        prevPageButton.addEventListener("click", () => {
          if (state.page > 1) {
            state.page -= 1
            renderNotes()
          }
        })
        nextPageButton.addEventListener("click", () => {
          const totalPages = Math.max(1, Math.ceil(state.filtered.length / state.pageSize))
          if (state.page < totalPages) {
            state.page += 1
            renderNotes()
          }
        })
        manageToggle.addEventListener("click", () => {
          state.manageMode = !state.manageMode
          if (state.manageMode) {
            manageToggle.innerHTML = "完成管理"
          } else {
            manageToggle.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8.14667 1.33334H7.85333C7.49971 1.33334 7.16057 1.47382 6.91053 1.72387C6.66048 1.97392 6.52 2.31305 6.52 2.66668V2.78668C6.51976 3.02049 6.45804 3.25014 6.34103 3.45257C6.22401 3.655 6.05583 3.8231 5.85333 3.94001L5.56667 4.10668C5.36398 4.2237 5.13405 4.28531 4.9 4.28531C4.66595 4.28531 4.43603 4.2237 4.23333 4.10668L4.13333 4.05334C3.82738 3.87685 3.46389 3.82897 3.12267 3.92022C2.78145 4.01146 2.49037 4.23437 2.31333 4.54001L2.16667 4.79334C1.99018 5.0993 1.9423 5.46279 2.03354 5.80401C2.12478 6.14523 2.34769 6.43631 2.65333 6.61334L2.75333 6.68001C2.95485 6.79635 3.12241 6.9634 3.23937 7.16456C3.35632 7.36573 3.4186 7.59399 3.42 7.82668V8.16668C3.42093 8.40162 3.35977 8.63265 3.2427 8.83635C3.12563 9.04005 2.95681 9.2092 2.75333 9.32668L2.65333 9.38668C2.34769 9.56371 2.12478 9.85479 2.03354 10.196C1.9423 10.5372 1.99018 10.9007 2.16667 11.2067L2.31333 11.46C2.49037 11.7657 2.78145 11.9886 3.12267 12.0798C3.46389 12.171 3.82738 12.1232 4.13333 11.9467L4.23333 11.8933C4.43603 11.7763 4.66595 11.7147 4.9 11.7147C5.13405 11.7147 5.36398 11.7763 5.56667 11.8933L5.85333 12.06C6.05583 12.1769 6.22401 12.345 6.34103 12.5475C6.45804 12.7499 6.51976 12.9795 6.52 13.2133V13.3333C6.52 13.687 6.66048 14.0261 6.91053 14.2762C7.16057 14.5262 7.49971 14.6667 7.85333 14.6667H8.14667C8.50029 14.6667 8.83943 14.5262 9.08948 14.2762C9.33953 14.0261 9.48 13.687 9.48 13.3333V13.2133C9.48024 12.9795 9.54196 12.7499 9.65898 12.5475C9.77599 12.345 9.94418 12.1769 10.1467 12.06L10.4333 11.8933C10.636 11.7763 10.866 11.7147 11.1 11.7147C11.3341 11.7147 11.564 11.7763 11.7667 11.8933L11.8667 11.9467C12.1726 12.1232 12.5361 12.171 12.8773 12.0798C13.2186 11.9886 13.5096 11.7657 13.6867 11.46L13.8333 11.2C14.0098 10.8941 14.0577 10.5306 13.9665 10.1893C13.8752 9.84812 13.6523 9.55704 13.3467 9.38001L13.2467 9.32668C13.0432 9.2092 12.8744 9.04005 12.7573 8.83635C12.6402 8.63265 12.5791 8.40162 12.58 8.16668V7.83334C12.5791 7.5984 12.6402 7.36738 12.7573 7.16367C12.8744 6.95997 13.0432 6.79082 13.2467 6.67334L13.3467 6.61334C13.6523 6.43631 13.8752 6.14523 13.9665 5.80401C14.0577 5.46279 14.0098 5.0993 13.8333 4.79334L13.6867 4.54001C13.5096 4.23437 13.2186 4.01146 12.8773 3.92022C12.5361 3.82897 12.1726 3.87685 11.8667 4.05334L11.7667 4.10668C11.564 4.2237 11.3341 4.28531 11.1 4.28531C10.866 4.28531 10.636 4.2237 10.4333 4.10668L10.1467 3.94001C9.94418 3.8231 9.77599 3.655 9.65898 3.45257C9.54196 3.25014 9.48024 3.02049 9.48 2.78668V2.66668C9.48 2.31305 9.33953 1.97392 9.08948 1.72387C8.83943 1.47382 8.50029 1.33334 8.14667 1.33334Z" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.33333" stroke-linecap="round" stroke-linejoin="round"/>

            </svg>`
          }
          if (!state.manageMode) {
            state.selectedIds.clear()
          }
          renderNotes()
        })
        deleteSelected.addEventListener("click", () => {
          removeNotes(Array.from(state.selectedIds))
          state.selectedIds.clear()
          updateSelectionBar()
        })
        clearSelected.addEventListener("click", () => {
          state.selectedIds.clear()
          updateSelectionBar()
          renderNotes()
        })
        clearInputButton.addEventListener("click", () => {
          importInput.value = ""
          importStatus.textContent = ""
        })
        importButton.addEventListener("click", () => {
          const raw = importInput.value.trim()
          if (!raw) {
            importStatus.textContent = "请先输入要导入的内容"
            return
          }
          const parsed = parseImportText(raw)
          if (parsed.length === 0) {
            importStatus.textContent = "未解析到有效笔记"
            return
          }
          state.extraNotes = [...state.extraNotes, ...parsed]
          saveExtraNotes(state.extraNotes)
          rebuildNotes()
          updateBooks()
          updateSections()
          applyFilters()
          importStatus.textContent = `已导入 ${parsed.length} 条笔记`
          importInput.value = ""
          refreshReview()
        })
        backToList.addEventListener("click", (event) => {
          event.preventDefault()
          window.location.hash = ""
          updateRoute()
        })
        reviewPrev.addEventListener("click", () => {
          if (state.reviewIds.length === 0) {
            return
          }
          state.reviewIndex = (state.reviewIndex - 1 + state.reviewIds.length) % state.reviewIds.length
          renderReview()
        })
        reviewNext.addEventListener("click", () => {
          if (state.reviewIds.length === 0) {
            return
          }
          state.reviewIndex = (state.reviewIndex + 1) % state.reviewIds.length
          renderReview()
        })
        let touchStartX = 0
        reviewContent.addEventListener("touchstart", (event) => {
          touchStartX = event.changedTouches[0].clientX
        })
        reviewContent.addEventListener("touchend", (event) => {
          const diff = event.changedTouches[0].clientX - touchStartX
          if (Math.abs(diff) < 40) {
            return
          }
          if (diff > 0) {
            reviewPrev.click()
          } else {
            reviewNext.click()
          }
        })
        window.addEventListener("hashchange", updateRoute)
      }

      const init = async () => {
        let data = { notes: [], books: [] }
        try {
          const response = await fetch("./notes.json")
          data = await response.json()
        } catch (error) {
          // 当通过 file:// 直接打开时，部分浏览器会阻止 fetch 本地 JSON；
          // 这里兜底让页面仍可使用（至少能浏览/导入本地笔记）。
          console.warn("Failed to load notes.json, falling back to empty base notes.", error)
        }
        state.baseNotes = (data.notes || []).map((note) => normalizeNote({ ...note, source: "base" }))
        state.extraNotes = loadExtraNotes()
        state.deletedIds = loadDeletedIds()
        rebuildNotes()
        state.books = data.books || []
        updateBooks()
        updateSections()
        renderTypeOptions()
        state.filtered = state.notes
        renderNotes()
        attachEvents()
        updateRoute()
        refreshReview()
        updateSelectionBar()
      }

      init()
    </script>
  </body>
</html>
